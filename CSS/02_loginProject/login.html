<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        body{
            /* background-color: #1a1a1a; */
            background-image: linear-gradient(135deg, blue,rgb(219, 141, 154),rgb(237, 170, 240));
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
        }
        .card{
            background-color: #ffffff0a;
            /* backdrop-filter: blur(10px); */
            backdrop-filter: blur(10px) saturate(100%);
             /* -webkit-backdrop-filter: blur(10px); */
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            padding: 50px;
            width: 300px;

        }

        h2{
            color: #0011ff;
            text-align: center;
            margin-bottom: 25px;
        }

        form{
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input{
            /* margin-bottom: 15px; */
            padding: 10px;
            border-radius: 5px;
            border: #1a1a1aa2 1px solid;

        }

        button{
            padding: 10px;
            width: auto;
            justify-content: center;
            align-items: center;
            margin: auto;
            background-color: aqua;
            border: none;
            border-radius: 5px;
            border: #1a1a1aa2 1px solid;
            cursor: pointer;
        }
        button:hover{
            background-color: #35a5a5;
            box-shadow: 0 0 10px #35a5a5;
        }

    </style>
</head>
<body>
    <div class="card">
        <form action="">
            <h2>Login</h2>
            <input type="tel" placeholder="Phone Number">
            <input type="email" placeholder="Email">
            <input type="password" placeholder="Password">
            <button type="submit">SUBMIT</button>
        </form>
    </div>
</body>
</html>
